name: xboard_client
description: "Xboard VPN Client - Flutter + sing-box"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  # HTTP
  dio: ^5.7.0
  # Routing
  go_router: ^14.8.1
  # Storage
  flutter_secure_storage: ^9.2.4
  shared_preferences: ^2.3.5
  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # Utils
  path_provider: ^2.1.5
  intl: ^0.20.2
  url_launcher: ^6.3.1
  # Desktop window management
  window_manager: ^0.4.3
  # System tray
  tray_manager: ^0.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  freezed: ^2.5.8
  json_serializable: ^6.9.4
  riverpod_generator: ^2.6.3
  msix: ^3.16.8

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/app_icon.ico
    - assets/app_icon.png

msix_config:
  display_name: Xboard
  publisher_display_name: Xboard
  identity_name: com.xboard.client
  msix_version: 1.0.0.0
  logo_path: assets/app_icon.png
  capabilities: internetClient, internetClientServer
  install_certificate: false
