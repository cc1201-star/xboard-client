name: Build Desktop Apps

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release
      - name: Build installer with Inno Setup
        run: iscc windows\installer.iss
      - uses: actions/upload-artifact@v4
        with:
          name: xboard-windows-setup
          path: build/installer/Xboard-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release
      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Xboard" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "xboard_client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "build/macos/Xboard.dmg" \
            "build/macos/Build/Products/Release/xboard_client.app"
      - uses: actions/upload-artifact@v4
        with:
          name: xboard-macos-dmg
          path: build/macos/Xboard.dmg
