name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  MIHOMO_VERSION: v1.19.14

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download mihomo kernel (Windows)
        shell: pwsh
        run: |
          $url = "https://github.com/MetaCubeX/mihomo/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-windows-amd64-${{ env.MIHOMO_VERSION }}.zip"
          Invoke-WebRequest -Uri $url -OutFile mihomo.zip
          Expand-Archive mihomo.zip -DestinationPath mihomo-tmp
          New-Item -ItemType Directory -Force -Path assets/bin/windows
          $exe = Get-ChildItem mihomo-tmp -Filter *.exe -Recurse | Select-Object -First 1
          Copy-Item $exe.FullName assets/bin/windows/mihomo.exe

      - run: flutter config --enable-windows-desktop
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Download Inno Setup Chinese language pack
        run: |
          $url = "https://raw.githubusercontent.com/jrsoftware/issrc/main/Files/Languages/Unofficial/ChineseSimplified.isl"
          $dest = "C:\Program Files (x86)\Inno Setup 6\Languages\ChineseSimplified.isl"
          Invoke-WebRequest -Uri $url -OutFile $dest
      - name: Build installer with Inno Setup
        run: iscc windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: xboard-windows-setup
          path: build/installer/Xboard-Setup.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download mihomo kernels (macOS arm64 + amd64)
        run: |
          mkdir -p assets/bin/macos
          curl -fSL "https://github.com/MetaCubeX/mihomo/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-darwin-arm64-${{ env.MIHOMO_VERSION }}.gz" | gunzip > assets/bin/macos/mihomo-arm64
          curl -fSL "https://github.com/MetaCubeX/mihomo/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-darwin-amd64-${{ env.MIHOMO_VERSION }}.gz" | gunzip > assets/bin/macos/mihomo-amd64
          chmod +x assets/bin/macos/mihomo-*

      - run: flutter config --enable-macos-desktop
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create DMG
        run: |
          brew install create-dmg
          create-dmg \
            --volname "Xboard" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "xboard_client.app" 150 190 \
            --app-drop-link 450 190 \
            --no-internet-enable \
            "build/macos/Xboard.dmg" \
            "build/macos/Build/Products/Release/xboard_client.app"

      - uses: actions/upload-artifact@v4
        with:
          name: xboard-macos-dmg
          path: build/macos/Xboard.dmg

  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Download mihomo kernels (Android)
        run: |
          mkdir -p android/app/src/main/jniLibs/{arm64-v8a,armeabi-v7a,x86_64}
          curl -fSL "https://github.com/MetaCubeX/mihomo/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-android-arm64-v8-${{ env.MIHOMO_VERSION }}.gz" | gunzip > android/app/src/main/jniLibs/arm64-v8a/libmihomo.so
          curl -fSL "https://github.com/MetaCubeX/mihomo/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-android-armv7-${{ env.MIHOMO_VERSION }}.gz" | gunzip > android/app/src/main/jniLibs/armeabi-v7a/libmihomo.so
          curl -fSL "https://github.com/MetaCubeX/mihomo/releases/download/${{ env.MIHOMO_VERSION }}/mihomo-android-amd64-${{ env.MIHOMO_VERSION }}.gz" | gunzip > android/app/src/main/jniLibs/x86_64/libmihomo.so
          chmod +x android/app/src/main/jniLibs/*/libmihomo.so

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: xboard-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build-windows, build-macos, build-android]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/xboard-windows-setup/Xboard-Setup.exe
            artifacts/xboard-macos-dmg/Xboard.dmg
            artifacts/xboard-android-apk/app-release.apk
          generate_release_notes: true
